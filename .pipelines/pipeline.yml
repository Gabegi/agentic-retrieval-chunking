# Single gated pipeline: Test -> Plan -> Apply -> Deploy. Each stage only runs if the
# previous one succeeded (dependsOn + condition: succeeded()), so a broken build/test
# never reaches Terraform, and a failed/skipped Apply never reaches the app deploy.
# Same logic as base/run-unit-tests.yml, base/deploy-azure-infrastructure.yml, and
# base/deploy-function-app.yml, composed into one gated run - those three are kept
# standalone (trigger: none) for reference/manual reruns only; this is the one that
# actually runs automatically.
#
# On a PR: only Test and Plan run (Plan is read-only / diagnostic - safe on PRs).
# Apply and Deploy are gated off PRs via `ne(variables['Build.Reason'], 'PullRequest')`,
# same as before.
#
# 'production' environment requires an Approval check in Pipelines > Environments,
# gating the Apply stage (and therefore Deploy, since Deploy depends on Apply).

# Per-run display name, e.g. "deploy-to-development-20260721.1" - the pipeline
# definition itself is named "deploy-to-environment" (one definition serves both
# branches, see the envName variable below), this is what makes each individual
# run's name reflect which environment it actually targeted.
name: 'deploy-to-$(envName)-$(Date:yyyyMMdd)$(Rev:.r)'

trigger:
  branches:
    include:
      - development
      - production

pr:
  branches:
    include:
      - development
      - production

pool:
  vmImage: 'ubuntu-latest'

variables:
  - ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/production') }}:
      - name: envName
        value: 'production'
      - name: serviceConnection
        value: 'cor-cap-app-prd'
      - name: tfvarsFile
        value: 'envs/prod.tfvars'
      - name: backendRgName
        value: 'cor-cap-cicd-prd-we-001'
      - name: backendKey
        value: 'prod.terraform.tfstate'
      - name: backendStorageAccount
        value: 'corsttfcapprdwe'
      - name: backendContainer
        value: 'terraform-state-app'
      - name: functionAppName
        value: 'cor-func-idx-cap-prd-we-001'
      - name: functionAppRg
        value: 'cor-cap-data-prd-we-001'
      - name: networkRg
        value: 'cor-cap-network-prd-we-001'
      - name: vnetName
        value: 'cor-vnet-cap-prd-we-001'
  - ${{ else }}:
      - name: envName
        value: 'development'
      - name: serviceConnection
        value: 'cor-cap-app-dev'
      - name: tfvarsFile
        value: 'envs/dev.tfvars'
      - name: backendRgName
        value: 'cor-cap-cicd-dev-we-001'
      - name: backendKey
        value: 'dev.terraform.tfstate'
      - name: backendStorageAccount
        value: 'corsttfcapdevwe'
      - name: backendContainer
        value: 'terraform-state-app'
      - name: functionAppName
        value: 'cor-func-idx-cap-dev-we-001'
      - name: functionAppRg
        value: 'cor-cap-data-dev-we-001'
      - name: networkRg
        value: 'cor-cap-network-dev-we-001'
      - name: vnetName
        value: 'cor-vnet-cap-dev-we-001'

stages:

  # ── 1. Test ─────────────────────────────────────────────────────────────────
  - stage: Test
    displayName: 'Build & Unit Test'
    jobs:
      - job: build_test
        steps:
          - checkout: self

          - task: UseDotNet@2
            displayName: 'Install .NET 10 SDK'
            inputs:
              packageType: 'sdk'
              version: '10.0.x'

          - script: |
              dotnet restore src/AgenticRagApplication.sln
            displayName: 'Restore'

          # Builds the whole solution (including RagApp.Evaluation.Tests) so a
          # compile break anywhere is still caught here - only the actual test
          # run below is scoped to unit tests. Evaluation.Tests is excluded from
          # `dotnet test` because it calls out to live Azure OpenAI/Search
          # (DefaultAzureCredential + SEARCH_ENDPOINT/OPENAI_* env vars) that
          # this pipeline has no service connection or credentials for.
          - script: |
              dotnet build src/AgenticRagApplication.sln -c Release --no-restore
            displayName: 'Build'

          # One test project per production project (src/UnitTests/) - each still logs to
          # the same shared trx/coverage folder so publish steps below don't need updating
          # per project.
          - script: |
              for proj in \
                src/UnitTests/AgenticRagApp.Infrastructure.Tests/AgenticRagApp.Infrastructure.Tests.csproj \
                src/UnitTests/AgenticRagApp.Observability.Tests/AgenticRagApp.Observability.Tests.csproj \
                src/UnitTests/AgenticRagApp.Querying.Tests/AgenticRagApp.Querying.Tests.csproj \
                src/UnitTests/AgenticRagApp.Indexing.Pdf.Tests/AgenticRagApp.Indexing.Pdf.Tests.csproj \
                src/UnitTests/AgenticRagApp.Indexing.Csv.Tests/AgenticRagApp.Indexing.Csv.Tests.csproj \
                src/UnitTests/AgenticRagApp.FunctionApp.Tests/AgenticRagApp.FunctionApp.Tests.csproj; do
                dotnet test "$proj" \
                  -c Release --no-build \
                  --logger "trx;LogFileName=$(basename "$proj" .csproj)-test-results.trx" \
                  --results-directory $(Agent.TempDirectory)/testresults \
                  --collect:"XPlat Code Coverage" \
                  -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
              done
            displayName: 'Run unit tests with coverage'

          - task: PublishTestResults@2
            displayName: 'Publish test results'
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: 'VSTest'
              testResultsFiles: '**/test-results.trx'
              searchFolder: '$(Agent.TempDirectory)/testresults'
              mergeTestResults: true

          # coverlet.collector drops coverage.cobertura.xml under a per-run GUID subfolder of
          # --results-directory - the double-** glob picks it up regardless of that GUID.
          - task: PublishCodeCoverageResults@2
            displayName: 'Publish code coverage'
            condition: succeededOrFailed()
            inputs:
              summaryFileLocation: '$(Agent.TempDirectory)/testresults/**/coverage.cobertura.xml'

  # ── 2. Plan ─────────────────────────────────────────────────────────────────
  # Runs on PRs and on push, but only after Test succeeds: init, validate, plan.
  - stage: Plan
    displayName: 'Validate & Plan (${{ variables.envName }})'
    dependsOn: Test
    condition: succeeded()
    jobs:
      - job: terraform_plan
        steps:
          - checkout: self

          # Read-only: pulls the actual current state of everything relevant
          # to the indexer Function App's networking in one shot - app
          # state/config, VNet integration, both subnets' actual NSG/route
          # table associations, the spoke route table's routes, the pe
          # subnet's (platform-owned) NSG rules, both private endpoints'
          # provisioning state + DNS zone groups, the actual private DNS A
          # records, and the content share's storage account config.
          - task: AzureCLI@2
            displayName: 'DIAGNOSTIC: full Function App + networking state'
            inputs:
              azureSubscription: '$(serviceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                FUNC_APP="$(functionAppName)"
                FUNC_RG="$(functionAppRg)"
                NET_RG="$(networkRg)"
                VNET="$(vnetName)"
                ROUTE_TABLE="cor-rt-spoke-cap-dev-we-001"
                PE_NSG="cor-nsg-cap-dev-we-001"
                FUNC_STORAGE="corstfunccapdevwe"
                HUB_SUB="c8e46005-ce0e-4be5-9ded-0178e19fbe28"
                HUB_DNS_RG="cor-connectivity-dns-prd-we-001"

                echo "=== Function App state/config ==="
                az functionapp show -g "$FUNC_RG" -n "$FUNC_APP" \
                  --query "{state:state, usageState:usageState, availabilityState:availabilityState, publicNetworkAccess:publicNetworkAccess, vnetRouteAll:siteConfig.vnetRouteAllEnabled, outboundIps:outboundIpAddresses}" -o json

                echo "=== Function App VNet integration ==="
                az functionapp vnet-integration list -g "$FUNC_RG" -n "$FUNC_APP" -o json

                echo "=== Function App plan (Consumption/Premium/Flex/Dedicated?) ==="
                az functionapp show -g "$FUNC_RG" -n "$FUNC_APP" --query "{sku:sku, kind:kind}" -o json
                PLAN_ID=$(az functionapp show -g "$FUNC_RG" -n "$FUNC_APP" --query "serverFarmId" -o tsv)
                az appservice plan show --ids "$PLAN_ID" --query "{name:name, sku:sku}" -o json

                echo "=== WEBSITE_VNET_ROUTE_ALL / WEBSITE_CONTENTOVERVNET ==="
                az functionapp config appsettings list -g "$FUNC_RG" -n "$FUNC_APP" \
                  --query "[?name=='WEBSITE_VNET_ROUTE_ALL' || name=='WEBSITE_CONTENTOVERVNET']" -o table

                echo "=== Function App app setting names (values omitted) ==="
                az functionapp config appsettings list -g "$FUNC_RG" -n "$FUNC_APP" --query "[].name" -o table

                echo "=== func subnet: actual current NSG/route table association ==="
                az network vnet subnet show -g "$NET_RG" --vnet-name "$VNET" -n cor-snet-cap-func-001 \
                  --query "{addressPrefix:addressPrefix, nsg:networkSecurityGroup.id, routeTable:routeTable.id, privateEndpointNetworkPolicies:privateEndpointNetworkPolicies}" -o json

                echo "=== pe subnet: actual current NSG/route table association ==="
                az network vnet subnet show -g "$NET_RG" --vnet-name "$VNET" -n cor-snet-cap-pe-001 \
                  --query "{addressPrefix:addressPrefix, nsg:networkSecurityGroup.id, routeTable:routeTable.id, privateEndpointNetworkPolicies:privateEndpointNetworkPolicies}" -o json

                echo "=== spoke route table: current routes ==="
                az network route-table route list -g "$NET_RG" --route-table-name "$ROUTE_TABLE" -o table

                echo "=== pe subnet NSG rules (platform-owned) ==="
                az network nsg rule list -g "$NET_RG" --nsg-name "$PE_NSG" -o table

                echo "=== func site private endpoint: provisioning + connection state ==="
                az network private-endpoint show -g "$FUNC_RG" -n cor-pep-func-cap-dev-we-001 \
                  --query "{provisioningState:provisioningState, connectionState:privateLinkServiceConnections[0].privateLinkServiceConnectionState}" -o json
                az network private-endpoint dns-zone-group list -g "$FUNC_RG" --endpoint-name cor-pep-func-cap-dev-we-001 -o json

                echo "=== storage file private endpoint: provisioning + connection state ==="
                az network private-endpoint show -g "$FUNC_RG" -n cor-pep-stfunc-file-cap-dev-we-001 \
                  --query "{provisioningState:provisioningState, connectionState:privateLinkServiceConnections[0].privateLinkServiceConnectionState}" -o json
                az network private-endpoint dns-zone-group list -g "$FUNC_RG" --endpoint-name cor-pep-stfunc-file-cap-dev-we-001 -o json

                echo "=== private DNS A records: privatelink.file.core.windows.net ==="
                az network private-dns record-set a list -g "$HUB_DNS_RG" -z privatelink.file.core.windows.net --subscription "$HUB_SUB" -o table

                echo "=== private DNS A records: privatelink.azurewebsites.net ==="
                az network private-dns record-set a list -g "$HUB_DNS_RG" -z privatelink.azurewebsites.net --subscription "$HUB_SUB" -o table

                echo "=== is $VNET actually LINKED to privatelink.file.core.windows.net? (A record existing isn't enough - the zone must be linked to this VNet for its resolver to consult it) ==="
                az network private-dns link vnet list -g "$HUB_DNS_RG" -z privatelink.file.core.windows.net --subscription "$HUB_SUB" \
                  --query "[?virtualNetwork.id.ends_with(@, '$VNET')] | [].{vnet:virtualNetwork.id, state:virtualNetworkLinkState}" -o table

                echo "=== is $VNET actually LINKED to privatelink.azurewebsites.net? ==="
                az network private-dns link vnet list -g "$HUB_DNS_RG" -z privatelink.azurewebsites.net --subscription "$HUB_SUB" \
                  --query "[?virtualNetwork.id.ends_with(@, '$VNET')] | [].{vnet:virtualNetwork.id, state:virtualNetworkLinkState}" -o table

                echo "=== VNet custom DNS servers (expect empty/null - Azure default 168.63.129.16 path; a custom server here must itself resolve the privatelink zones) ==="
                az network vnet show -g "$NET_RG" -n "$VNET" --query "dhcpOptions.dnsServers" -o json

                echo "=== func storage account: public network access + network rules (incl. any Service Endpoint / virtual network rules) ==="
                az storage account show -g "$FUNC_RG" -n "$FUNC_STORAGE" \
                  --query "{publicNetworkAccess:publicNetworkAccess, defaultAction:networkRuleSet.defaultAction, bypass:networkRuleSet.bypass, virtualNetworkRules:networkRuleSet.virtualNetworkRules}" -o json

                echo "=== func storage account: content file share exists? (data-plane call - expected to fail from this runner, no VNet path to a private-endpoint-only account) ==="
                ACCOUNT_KEY=$(az storage account keys list -g "$FUNC_RG" -n "$FUNC_STORAGE" --query "[0].value" -o tsv)
                az storage share exists --account-name "$FUNC_STORAGE" --account-key "$ACCOUNT_KEY" --name "$FUNC_APP" -o json \
                  || echo "(failed as expected - this runner has no network path to the storage account's data plane)"

          # Blocking (unlike the diagnostic above): fails the stage if this
          # environment's VNet isn't actually linked to the private DNS zones
          # our private endpoints depend on. A private_dns_zone_group only
          # writes the A record into the zone - it doesn't link the zone to a
          # VNet, so a missing/pending link here means in-VNet resources
          # silently fall back to public DNS, which the target resource (e.g.
          # a storage account with public_network_access_enabled = false)
          # then rejects. Same two zones the diagnostic above already checks.
          - task: AzureCLI@2
            displayName: 'Check: private DNS zones linked to VNet'
            inputs:
              azureSubscription: '$(serviceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                HUB_SUB="c8e46005-ce0e-4be5-9ded-0178e19fbe28"
                HUB_DNS_RG="cor-connectivity-dns-prd-we-001"
                FAILED=0

                for ZONE in privatelink.file.core.windows.net privatelink.azurewebsites.net; do
                  STATE=$(az network private-dns link vnet list -g "$HUB_DNS_RG" -z "$ZONE" --subscription "$HUB_SUB" \
                    --query "[?virtualNetwork.id.ends_with(@, '$(vnetName)')].virtualNetworkLinkState" -o tsv)
                  if [ "$STATE" != "Completed" ]; then
                    echo "##vso[task.logissue type=error]$(vnetName) is not linked (state: '${STATE:-missing}') to $ZONE - DNS resolution for this zone falls back to public DNS, which public_network_access_enabled=false on the target resource then rejects. Ask the platform team to link it in cor-connectivity-prd."
                    FAILED=1
                  else
                    echo "OK: $(vnetName) is linked to $ZONE (Completed)"
                  fi
                done

                [ "$FAILED" -eq 0 ] || exit 1

          - template: templates/install-terraform.yml

          - template: templates/terraform-cli.yml
            parameters:
              displayName: 'Init'
              serviceConnection: '$(serviceConnection)'
              script: |
                terraform init \
                  -backend-config="resource_group_name=$(backendRgName)" \
                  -backend-config="storage_account_name=$(backendStorageAccount)" \
                  -backend-config="container_name=$(backendContainer)" \
                  -backend-config="key=$(backendKey)" \
                  -backend-config="use_azuread_auth=true"

          - template: templates/terraform-cli.yml
            parameters:
              displayName: 'Validate'
              serviceConnection: '$(serviceConnection)'
              script: terraform validate

          - template: templates/terraform-cli.yml
            parameters:
              displayName: 'Plan'
              serviceConnection: '$(serviceConnection)'
              script: |
                terraform plan \
                  -var-file="$(tfvarsFile)" \
                  -out=$(Build.ArtifactStagingDirectory)/tfplan

          - publish: '$(Build.ArtifactStagingDirectory)/tfplan'
            artifact: tfplan

  # ── 3. Apply ────────────────────────────────────────────────────────────────
  # Only runs on push to development/production, not on PRs, and only if Plan succeeded.
  # 'production' environment requires an Approval check in Pipelines > Environments.
  - stage: Apply
    displayName: 'Apply (${{ variables.envName }})'
    dependsOn: Plan
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - deployment: terraform_apply
        environment: '${{ variables.envName }}'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - download: current
                  artifact: tfplan

                - template: templates/install-terraform.yml

                - template: templates/terraform-cli.yml
                  parameters:
                    displayName: 'Init'
                    serviceConnection: '$(serviceConnection)'
                    script: |
                      terraform init \
                        -backend-config="resource_group_name=$(backendRgName)" \
                        -backend-config="storage_account_name=$(backendStorageAccount)" \
                        -backend-config="container_name=$(backendContainer)" \
                        -backend-config="key=$(backendKey)" \
                        -backend-config="use_azuread_auth=true"

                - template: templates/terraform-cli.yml
                  parameters:
                    displayName: 'Apply'
                    serviceConnection: '$(serviceConnection)'
                    script: terraform apply $(Pipeline.Workspace)/tfplan/tfplan

  # ── 4. Deploy ───────────────────────────────────────────────────────────────
  # Only runs on push to development/production, not on PRs, and only if Apply succeeded
  # (which itself only ran if Plan, which itself only ran if Test, succeeded) - so the
  # app only ever ships on top of a Terraform apply that ran against green tests.
  - stage: Deploy
    displayName: 'Deploy Application (${{ variables.envName }})'
    dependsOn: Apply
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - job: deploy_function_app
        steps:
          - checkout: self

          - task: UseDotNet@2
            displayName: 'Install .NET 10 SDK'
            inputs:
              packageType: 'sdk'
              version: '10.0.x'

          - script: |
              dotnet publish src/AgenticRagApp.FunctionApp/AgenticRagApp.FunctionApp.csproj -c Release -o $(Build.ArtifactStagingDirectory)/publish
            displayName: 'Publish'

          - script: |
              cd $(Build.ArtifactStagingDirectory)/publish
              zip -r $(Build.ArtifactStagingDirectory)/protocol-indexer.zip .
            displayName: 'Zip package'

          # Same OIDC service connection as the Plan/Apply stages above - no separate
          # secrets/credentials to manage for app deploys.
          #
          # The Function App denies public traffic by default (see
          # function_app.tf) and this hosted agent has no VNet access, so we
          # open a scoped Allow rule for this runner's own IP on the SCM
          # site just for the duration of the deploy, then remove it -
          # narrower window than leaving the app open, but not as clean as a
          # self-hosted agent living inside the VNet.
          - task: AzureCLI@2
            displayName: 'Open SCM firewall for this runner'
            inputs:
              azureSubscription: '$(serviceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                RUNNER_IP=$(curl -fsSL https://api.ipify.org)
                echo "##vso[task.setvariable variable=runnerIp]$RUNNER_IP"
                az functionapp config access-restriction add \
                  --resource-group $(functionAppRg) \
                  --name $(functionAppName) \
                  --rule-name "AzDoRunnerTemp" \
                  --action Allow \
                  --ip-address "$RUNNER_IP/32" \
                  --priority 100 \
                  --scm-site true

          # Temporary, diagnostic: capture Kudu's own log stream for the
          # duration of the zip deploy, to see the actual failure (e.g. the
          # ZipFS/siteversion.txt content-share-mount signature) instead of
          # just the generic 500/503 the CLI reports. Only works here because
          # the SCM firewall rule above is open for this runner right now -
          # remove once the deploy is reliably green.
          - task: AzureCLI@2
            displayName: 'Deploy to Function App'
            inputs:
              azureSubscription: '$(serviceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az webapp log tail -n $(functionAppName) -g $(functionAppRg) > $(Build.ArtifactStagingDirectory)/kudu-tail.log 2>&1 &
                TAIL_PID=$!

                set +e
                az functionapp deployment source config-zip \
                  --resource-group $(functionAppRg) \
                  --name $(functionAppName) \
                  --src $(Build.ArtifactStagingDirectory)/protocol-indexer.zip
                DEPLOY_EXIT=$?
                set -e

                sleep 10
                kill $TAIL_PID 2>/dev/null || true
                echo "=== Kudu log tail captured during deploy ==="
                cat $(Build.ArtifactStagingDirectory)/kudu-tail.log || true

                exit $DEPLOY_EXIT

          - task: AzureCLI@2
            displayName: 'Close SCM firewall for this runner'
            condition: always()
            inputs:
              azureSubscription: '$(serviceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az functionapp config access-restriction remove \
                  --resource-group $(functionAppRg) \
                  --name $(functionAppName) \
                  --rule-name "AzDoRunnerTemp" \
                  --scm-site true
