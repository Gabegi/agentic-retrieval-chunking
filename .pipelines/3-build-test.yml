trigger:
  branches:
    include:
      - development
      - production

pr:
  branches:
    include:
      - development
      - production

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: BuildAndTest
    displayName: 'Build & Unit Test'
    jobs:
      - job: build_test
        steps:
          - checkout: self

          - task: UseDotNet@2
            displayName: 'Install .NET 8 SDK'
            inputs:
              packageType: 'sdk'
              version: '8.0.x'

          - script: |
              dotnet restore src/ragapplication.sln
            displayName: 'Restore'

          # Builds the whole solution (including RagApp.Evaluation.Tests) so a
          # compile break anywhere is still caught here - only the actual test
          # run below is scoped to unit tests. Evaluation.Tests is excluded from
          # `dotnet test` because it calls out to live Azure OpenAI/Search
          # (DefaultAzureCredential + SEARCH_ENDPOINT/OPENAI_* env vars) that
          # this pipeline has no service connection or credentials for.
          - script: |
              dotnet build src/ragapplication.sln -c Release --no-restore
            displayName: 'Build'

          - script: |
              dotnet test src/RagApp.UnitTests/RagApp.UnitTests.csproj \
                -c Release --no-build \
                --logger "trx;LogFileName=test-results.trx" \
                --results-directory $(Agent.TempDirectory)/testresults \
                --collect:"XPlat Code Coverage" \
                -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura
            displayName: 'Run unit tests with coverage'

          - task: PublishTestResults@2
            displayName: 'Publish test results'
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: 'VSTest'
              testResultsFiles: '**/test-results.trx'
              searchFolder: '$(Agent.TempDirectory)/testresults'
              mergeTestResults: true

          # coverlet.collector drops coverage.cobertura.xml under a per-run GUID subfolder of
          # --results-directory - the double-** glob picks it up regardless of that GUID.
          - task: PublishCodeCoverageResults@2
            displayName: 'Publish code coverage'
            condition: succeededOrFailed()
            inputs:
              summaryFileLocation: '$(Agent.TempDirectory)/testresults/**/coverage.cobertura.xml'
