trigger: none
pr: none

variables:
  - ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/production') }}:
      - name: envName
        value: 'production'
      - name: serviceConnection
        value: 'cor-cap-app-prd'
      - name: functionAppName
        value: 'cor-func-idx-cap-prd-we-001'
      - name: functionAppRg
        value: 'cor-cap-data-prd-we-001'
  - ${{ else }}:
      - name: envName
        value: 'development'
      - name: serviceConnection
        value: 'cor-cap-app-dev'
      - name: functionAppName
        value: 'cor-func-idx-cap-dev-we-001'
      - name: functionAppRg
        value: 'cor-cap-data-dev-we-001'

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: Test
    displayName: 'Unit Tests (${{ variables.envName }})'
    jobs:
      - job: unit_tests
        steps:
          - checkout: self

          - task: UseDotNet@2
            displayName: 'Install .NET 8 SDK'
            inputs:
              packageType: 'sdk'
              version: '8.0.x'

          - script: |
              dotnet restore src/ragapplication.sln
            displayName: 'Restore'

          - script: |
              dotnet build src/ragapplication.sln -c Release --no-restore
            displayName: 'Build'

          # Same scope as 3-build-test.yml: RagApp.Evaluation.Tests calls out to live
          # Azure OpenAI/Search and is excluded here too, for the same reason.
          - script: |
              dotnet test src/RagApp.UnitTests/RagApp.UnitTests.csproj \
                -c Release --no-build \
                --logger "trx;LogFileName=test-results.trx" \
                --results-directory $(Agent.TempDirectory)/testresults
            displayName: 'Run unit tests'

          - task: PublishTestResults@2
            displayName: 'Publish test results'
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: 'VSTest'
              testResultsFiles: '**/test-results.trx'
              searchFolder: '$(Agent.TempDirectory)/testresults'
              mergeTestResults: true

  - stage: Deploy
    displayName: 'Deploy Application (${{ variables.envName }})'
    dependsOn: Test
    condition: succeeded()
    jobs:
      - job: deploy_function_app
        steps:
          - checkout: self

          - task: UseDotNet@2
            displayName: 'Install .NET 8 SDK'
            inputs:
              packageType: 'sdk'
              version: '8.0.x'

          - script: |
              dotnet publish src/agentic-rag-app/ProtocolsIndexer.csproj -c Release -o $(Build.ArtifactStagingDirectory)/publish
            displayName: 'Publish'

          - script: |
              cd $(Build.ArtifactStagingDirectory)/publish
              zip -r $(Build.ArtifactStagingDirectory)/protocol-indexer.zip .
            displayName: 'Zip package'

          # Same OIDC service connection as 1-infra-deploy.yml - no separate
          # secrets/credentials to manage for app deploys.
          #
          # The Function App denies public traffic by default (see
          # function_app.tf) and this hosted agent has no VNet access, so we
          # open a scoped Allow rule for this runner's own IP on the SCM
          # site just for the duration of the deploy, then remove it -
          # narrower window than leaving the app open, but not as clean as a
          # self-hosted agent living inside the VNet.
          - task: AzureCLI@2
            displayName: 'Open SCM firewall for this runner'
            inputs:
              azureSubscription: '$(serviceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                RUNNER_IP=$(curl -fsSL https://api.ipify.org)
                echo "##vso[task.setvariable variable=runnerIp]$RUNNER_IP"
                az functionapp config access-restriction add \
                  --resource-group $(functionAppRg) \
                  --name $(functionAppName) \
                  --rule-name "AzDoRunnerTemp" \
                  --action Allow \
                  --ip-address "$RUNNER_IP/32" \
                  --priority 100 \
                  --scm-site true

          - task: AzureCLI@2
            displayName: 'Deploy to Function App'
            inputs:
              azureSubscription: '$(serviceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az functionapp deployment source config-zip \
                  --resource-group $(functionAppRg) \
                  --name $(functionAppName) \
                  --src $(Build.ArtifactStagingDirectory)/protocol-indexer.zip

          - task: AzureCLI@2
            displayName: 'Close SCM firewall for this runner'
            condition: always()
            inputs:
              azureSubscription: '$(serviceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az functionapp config access-restriction remove \
                  --resource-group $(functionAppRg) \
                  --name $(functionAppName) \
                  --rule-name "AzDoRunnerTemp" \
                  --scm-site true
