trigger: none
pr: none

# Note on repeated use against the same environment: azurerm_key_vault.main
# (keyvault.tf) has purge_protection_enabled = true - intentional, not a bug,
# it stops the vault from being permanently deleted by accident or by a
# malicious actor. The tradeoff: this destroy pipeline can only soft-delete
# it, not purge it, so re-running Apply (1-infra-deploy.yml) for the same
# environment afterward will hit a global-name collision against the
# soft-deleted vault and need the name instance bumped (see the comment on
# azurerm_key_vault.main documenting this happening once already, "-001" ->
# "-002"). Either manually purge the soft-deleted vault first, or expect to
# bump the instance suffix each cycle.
parameters:
  - name: environment
    displayName: 'Environment to destroy'
    type: string
    default: development
    values:
      - development
      - production
  - name: confirmationText
    displayName: 'Type the environment name above exactly to confirm'
    type: string
    default: ''

variables:
  - ${{ if eq(parameters.environment, 'production') }}:
      - name: serviceConnection
        value: 'cor-cap-app-prd'
      - name: tfvarsFile
        value: 'envs/prod.tfvars'
      - name: backendRgName
        value: 'cor-cap-cicd-prd-we-001'
      - name: backendKey
        value: 'prod.terraform.tfstate'
      - name: backendStorageAccount
        value: 'corsttfcapprdwe'
      - name: backendContainer
        value: 'terraform-state-app'
  - ${{ else }}:
      - name: serviceConnection
        value: 'cor-cap-app-dev'
      - name: tfvarsFile
        value: 'envs/dev.tfvars'
      - name: backendRgName
        value: 'cor-cap-cicd-dev-we-001'
      - name: backendKey
        value: 'dev.terraform.tfstate'
      - name: backendStorageAccount
        value: 'corsttfcapdevwe'
      - name: backendContainer
        value: 'terraform-state-app'

pool:
  vmImage: 'ubuntu-latest'

stages:

  # Runs unconditionally so the confirmation check always executes before
  # anything that touches Terraform state.
  - stage: Confirm
    displayName: 'Confirm destroy (${{ parameters.environment }})'
    jobs:
      - job: check_confirmation
        steps:
          # confirmationText is free-form (no `values:` allowlist, unlike
          # `environment`) - passed via env: so it's a runtime shell variable,
          # never spliced into the script text via ${{ }} compile-time
          # expansion. Splicing it directly would let a value containing a
          # quote or shell metacharacter execute as code in this unconditional,
          # pre-approval-gate stage.
          - script: |
              if [ "$CONFIRMATION_TEXT" != "$TARGET_ENVIRONMENT" ]; then
                echo "##vso[task.logissue type=error]Confirmation text '$CONFIRMATION_TEXT' does not match environment '$TARGET_ENVIRONMENT'. Aborting."
                exit 1
              fi
              echo "Confirmed: destroying $TARGET_ENVIRONMENT."
            displayName: 'Check typed confirmation'
            env:
              CONFIRMATION_TEXT: ${{ parameters.confirmationText }}
              TARGET_ENVIRONMENT: ${{ parameters.environment }}

  - stage: Plan
    displayName: 'Destroy Plan (${{ parameters.environment }})'
    dependsOn: Confirm
    jobs:
      - job: terraform_destroy_plan
        steps:
          - checkout: self

          - template: templates/install-terraform.yml

          - template: templates/terraform-cli.yml
            parameters:
              displayName: 'Init'
              serviceConnection: '$(serviceConnection)'
              script: |
                terraform init \
                  -backend-config="resource_group_name=$(backendRgName)" \
                  -backend-config="storage_account_name=$(backendStorageAccount)" \
                  -backend-config="container_name=$(backendContainer)" \
                  -backend-config="key=$(backendKey)" \
                  -backend-config="use_azuread_auth=true"

          - template: templates/terraform-cli.yml
            parameters:
              displayName: 'Destroy Plan'
              serviceConnection: '$(serviceConnection)'
              script: |
                terraform plan \
                  -destroy \
                  -var-file="$(tfvarsFile)" \
                  -out=$(Build.ArtifactStagingDirectory)/tfplan

          - publish: '$(Build.ArtifactStagingDirectory)/tfplan'
            artifact: tfplan

  # Gated by the same Azure DevOps Environment approval checks as
  # 1-infra-deploy.yml (Pipelines > Environments > development/production).
  - stage: Apply
    displayName: 'Destroy Apply (${{ parameters.environment }})'
    dependsOn: Plan
    condition: succeeded()
    jobs:
      - deployment: terraform_destroy_apply
        environment: '${{ parameters.environment }}'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - download: current
                  artifact: tfplan

                - template: templates/install-terraform.yml

                - template: templates/terraform-cli.yml
                  parameters:
                    displayName: 'Init'
                    serviceConnection: '$(serviceConnection)'
                    script: |
                      terraform init \
                        -backend-config="resource_group_name=$(backendRgName)" \
                        -backend-config="storage_account_name=$(backendStorageAccount)" \
                        -backend-config="container_name=$(backendContainer)" \
                        -backend-config="key=$(backendKey)" \
                        -backend-config="use_azuread_auth=true"

                - template: templates/terraform-cli.yml
                  parameters:
                    displayName: 'Destroy Apply'
                    serviceConnection: '$(serviceConnection)'
                    script: terraform apply $(Pipeline.Workspace)/tfplan/tfplan
