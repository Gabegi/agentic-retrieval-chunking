# Wraps the OIDC auth preamble (Workload Identity Federation via the service
# connection) around a caller-supplied script, so it's defined once instead
# of copy-pasted into every terraform init/validate/plan/apply step. Callers
# just supply the terraform command(s) to run.
parameters:
  - name: displayName
    type: string
  - name: serviceConnection
    type: string
  - name: workingDirectory
    type: string
    default: '$(System.DefaultWorkingDirectory)/infra'
  - name: script
    type: string

steps:
  # AzureCLI@2 auto-populates AZURESUBSCRIPTION_TENANT_ID / _CLIENT_ID /
  # _SERVICE_CONNECTION_ID for the duration of THIS task — no stored secret
  # to extract, and no shared CLI session needed across tasks.
  - task: AzureCLI@2
    displayName: ${{ parameters.displayName }}
    inputs:
      azureSubscription: ${{ parameters.serviceConnection }}
      scriptType: bash
      scriptLocation: inlineScript
      workingDirectory: ${{ parameters.workingDirectory }}
      inlineScript: |
        export ARM_TENANT_ID=$AZURESUBSCRIPTION_TENANT_ID
        export ARM_CLIENT_ID=$AZURESUBSCRIPTION_CLIENT_ID
        export ARM_OIDC_AZURE_SERVICE_CONNECTION_ID=$AZURESUBSCRIPTION_SERVICE_CONNECTION_ID
        export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
        export ARM_USE_OIDC=true
        ${{ parameters.script }}
    env:
      ARM_OIDC_REQUEST_TOKEN: $(System.AccessToken)
