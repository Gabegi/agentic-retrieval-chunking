trigger:
  branches:
    include:
      - development
      - production

pr:
  branches:
    include:
      - development
      - production

pool:
  vmImage: 'ubuntu-latest'

variables:
  - ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/production') }}:
      - name: envName
        value: 'production'
      - name: serviceConnection
        value: 'cor-cap-app-prd'
      - name: tfvarsFile
        value: 'envs/prod.tfvars'
      - name: backendRgName
        value: 'cor-cap-cicd-prd-we-001'
      - name: backendKey
        value: 'prod.terraform.tfstate'
      - name: backendStorageAccount
        value: 'corsttfcapprdwe'
      - name: backendContainer
        value: 'terraform-state'
  - ${{ else }}:
      - name: envName
        value: 'development'
      - name: serviceConnection
        value: 'cor-cap-app-dev'
      - name: tfvarsFile
        value: 'envs/dev.tfvars'
      - name: backendRgName
        value: 'cor-cap-cicd-dev-we-001'
      - name: backendKey
        value: 'dev.terraform.tfstate'
      - name: backendStorageAccount
        value: 'corsttfcapdevwe'
      - name: backendContainer
        value: 'terraform-state'

stages:

  # Runs on PRs and on push to either branch: init, validate, plan
  - stage: Plan
    displayName: 'Validate & Plan ($(envName))'
    jobs:
      - job: terraform_plan
        steps:
          - checkout: self

          - script: |
              TF_VERSION="1.7.5"
              curl -fsSL "https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip" -o terraform.zip
              unzip -o terraform.zip
              sudo mv terraform /usr/local/bin/terraform
              terraform version
            displayName: 'Install Terraform'

          # Extract SP credentials into job-scoped variables.
          # AzureCLI@2 clears the CLI session on exit (az account clear),
          # so subsequent Bash tasks run with no active CLI session —
          # forcing Terraform to use ARM_* env vars instead of CLI auth.
          - task: AzureCLI@2
            displayName: 'Get SP Credentials'
            inputs:
              azureSubscription: '$(serviceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              addSpnToEnvironment: true
              inlineScript: |
                echo "##vso[task.setvariable variable=tf_client_id;issecret=true]$servicePrincipalId"
                echo "##vso[task.setvariable variable=tf_client_secret;issecret=true]$servicePrincipalKey"
                echo "##vso[task.setvariable variable=tf_tenant_id]$tenantId"
                echo "##vso[task.setvariable variable=tf_subscription_id]$(az account show --query id -o tsv)"

          # Secret pipeline variables (tf_client_id/tf_client_secret) don't
          # resolve via $(...) macro syntax inside a script body — only via
          # an explicit env: mapping on the task.
          - task: Bash@3
            displayName: 'Init'
            inputs:
              targetType: inline
              workingDirectory: '$(System.DefaultWorkingDirectory)/infra'
              script: |
                terraform init \
                  -backend-config="resource_group_name=$(backendRgName)" \
                  -backend-config="storage_account_name=$(backendStorageAccount)" \
                  -backend-config="container_name=$(backendContainer)" \
                  -backend-config="key=$(backendKey)" \
                  -backend-config="use_azuread_auth=true"
            env:
              ARM_CLIENT_ID: $(tf_client_id)
              ARM_CLIENT_SECRET: $(tf_client_secret)
              ARM_TENANT_ID: $(tf_tenant_id)
              ARM_SUBSCRIPTION_ID: $(tf_subscription_id)
              ARM_USE_CLI: 'false'

          - task: Bash@3
            displayName: 'Validate'
            inputs:
              targetType: inline
              workingDirectory: '$(System.DefaultWorkingDirectory)/infra'
              script: terraform validate
            env:
              ARM_CLIENT_ID: $(tf_client_id)
              ARM_CLIENT_SECRET: $(tf_client_secret)
              ARM_TENANT_ID: $(tf_tenant_id)
              ARM_SUBSCRIPTION_ID: $(tf_subscription_id)
              ARM_USE_CLI: 'false'

          - task: Bash@3
            displayName: 'Plan'
            inputs:
              targetType: inline
              workingDirectory: '$(System.DefaultWorkingDirectory)/infra'
              script: |
                terraform plan \
                  -var-file="$(tfvarsFile)" \
                  -out=$(Build.ArtifactStagingDirectory)/tfplan
            env:
              ARM_CLIENT_ID: $(tf_client_id)
              ARM_CLIENT_SECRET: $(tf_client_secret)
              ARM_TENANT_ID: $(tf_tenant_id)
              ARM_SUBSCRIPTION_ID: $(tf_subscription_id)
              ARM_USE_CLI: 'false'

          - publish: '$(Build.ArtifactStagingDirectory)/tfplan'
            artifact: tfplan

  # Only runs on push to development/production, not on PRs.
  # 'production' environment requires an Approval check in Pipelines > Environments.
  - stage: Apply
    displayName: 'Apply ($(envName))'
    dependsOn: Plan
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - deployment: terraform_apply
        environment: '$(envName)'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - download: current
                  artifact: tfplan

                - script: |
                    TF_VERSION="1.7.5"
                    curl -fsSL "https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip" -o terraform.zip
                    unzip -o terraform.zip
                    sudo mv terraform /usr/local/bin/terraform
                    terraform version
                  displayName: 'Install Terraform'

                - task: AzureCLI@2
                  displayName: 'Get SP Credentials'
                  inputs:
                    azureSubscription: '$(serviceConnection)'
                    scriptType: bash
                    scriptLocation: inlineScript
                    addSpnToEnvironment: true
                    inlineScript: |
                      echo "##vso[task.setvariable variable=tf_client_id;issecret=true]$servicePrincipalId"
                      echo "##vso[task.setvariable variable=tf_client_secret;issecret=true]$servicePrincipalKey"
                      echo "##vso[task.setvariable variable=tf_tenant_id]$tenantId"
                      echo "##vso[task.setvariable variable=tf_subscription_id]$(az account show --query id -o tsv)"

                - task: Bash@3
                  displayName: 'Init'
                  inputs:
                    targetType: inline
                    workingDirectory: '$(System.DefaultWorkingDirectory)/infra'
                    script: |
                      terraform init \
                        -backend-config="resource_group_name=$(backendRgName)" \
                        -backend-config="storage_account_name=$(backendStorageAccount)" \
                        -backend-config="container_name=$(backendContainer)" \
                        -backend-config="key=$(backendKey)" \
                        -backend-config="use_azuread_auth=true"
                  env:
                    ARM_CLIENT_ID: $(tf_client_id)
                    ARM_CLIENT_SECRET: $(tf_client_secret)
                    ARM_TENANT_ID: $(tf_tenant_id)
                    ARM_SUBSCRIPTION_ID: $(tf_subscription_id)
                    ARM_USE_CLI: 'false'

                - task: Bash@3
                  displayName: 'Apply'
                  inputs:
                    targetType: inline
                    workingDirectory: '$(System.DefaultWorkingDirectory)/infra'
                    script: terraform apply $(Pipeline.Workspace)/tfplan/tfplan
                  env:
                    ARM_CLIENT_ID: $(tf_client_id)
                    ARM_CLIENT_SECRET: $(tf_client_secret)
                    ARM_TENANT_ID: $(tf_tenant_id)
                    ARM_SUBSCRIPTION_ID: $(tf_subscription_id)
                    ARM_USE_CLI: 'false'
