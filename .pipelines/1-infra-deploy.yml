trigger:
  branches:
    include:
      - development
      - production

pr:
  branches:
    include:
      - development
      - production

pool:
  vmImage: 'ubuntu-latest'

variables:
  - ${{ if eq(variables['Build.SourceBranch'], 'refs/heads/production') }}:
      - name: envName
        value: 'production'
      - name: serviceConnection
        value: 'cor-cap-app-prd'
      - name: tfvarsFile
        value: 'envs/prod.tfvars'
      - name: backendRgName
        value: 'cor-cap-cicd-prd-we-001'
      - name: backendKey
        value: 'prod.terraform.tfstate'
      - name: backendStorageAccount
        value: 'corsttfcapprdwe'
      - name: backendContainer
        value: 'terraform-state-app'
  - ${{ else }}:
      - name: envName
        value: 'development'
      - name: serviceConnection
        value: 'cor-cap-app-dev'
      - name: tfvarsFile
        value: 'envs/dev.tfvars'
      - name: backendRgName
        value: 'cor-cap-cicd-dev-we-001'
      - name: backendKey
        value: 'dev.terraform.tfstate'
      - name: backendStorageAccount
        value: 'corsttfcapdevwe'
      - name: backendContainer
        value: 'terraform-state-app'

stages:

  # Runs on PRs and on push to either branch: init, validate, plan
  - stage: Plan
    displayName: 'Validate & Plan (${{ variables.envName }})'
    jobs:
      - job: terraform_plan
        steps:
          - checkout: self

          # Temporary, read-only: find the private DNS zone(s) the platform
          # team's Policy-based zone links were supposed to attach to our
          # private endpoints (docs/platform-team-dns-verzoek.md). Our own
          # accounts can't see these zones, but this service connection's SP
          # apparently can - confirmed they live in the cor-connectivity-prd
          # hub subscription, cor-connectivity-dns-prd-we-001 RG. Remove this
          # step once we've captured the zone resource IDs and wired up
          # private_dns_zone_group in Terraform.
          - task: AzureCLI@2
            displayName: 'DIAGNOSTIC: list private DNS zones'
            inputs:
              azureSubscription: '$(serviceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az account set --subscription c8e46005-ce0e-4be5-9ded-0178e19fbe28
                echo "--- all zones in cor-connectivity-dns-prd-we-001 ---"
                az network private-dns zone list -g cor-connectivity-dns-prd-we-001 --query "[].{name:name, id:id}" -o table
                echo "--- vnet links on each zone (confirm our vnet isn't already linked) ---"
                for z in $(az network private-dns zone list -g cor-connectivity-dns-prd-we-001 --query "[].name" -o tsv); do
                  echo "zone: $z"
                  az network private-dns link vnet list -g cor-connectivity-dns-prd-we-001 -z "$z" --query "[].{vnet:virtualNetwork.id, state:virtualNetworkLinkState}" -o table
                done

          # Temporary, read-only: cor-connectivity-prd is a PRODUCTION hub -
          # worth confirming whether there's a separate dev-scoped
          # connectivity subscription this SP can also see (or should be
          # using instead), and what this SP's full access footprint is so
          # we're not guessing from subscription-list visibility alone
          # (a subscription with zero role assignments for this SP simply
          # won't show up in `az account list`, so that alone can't prove a
          # dev hub doesn't exist).
          - task: AzureCLI@2
            displayName: 'DIAGNOSTIC: full SP access footprint'
            inputs:
              azureSubscription: '$(serviceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                echo "--- subscriptions this SP can see (any role, any scope) ---"
                az account list -o table
                echo "--- all role assignments for this SP, across every scope it can enumerate ---"
                SP_ID=$(az account show --query user.name -o tsv)
                az role assignment list --assignee "$SP_ID" --all -o table
                echo "--- management groups visible to this SP, if any ---"
                az account management-group list -o table

          - script: |
              TF_VERSION="1.15.7"
              curl -fsSL "https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip" -o terraform.zip
              unzip -o terraform.zip
              sudo mv terraform /usr/local/bin/terraform
              terraform version
            displayName: 'Install Terraform'

          # OIDC auth via the service connection's Workload Identity Federation.
          # AzureCLI@2 auto-populates AZURESUBSCRIPTION_TENANT_ID / _CLIENT_ID /
          # _SERVICE_CONNECTION_ID for the duration of THIS task — no stored
          # secret to extract, and no shared CLI session needed across tasks.
          - task: AzureCLI@2
            displayName: 'Init'
            inputs:
              azureSubscription: '$(serviceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              workingDirectory: '$(System.DefaultWorkingDirectory)/infra'
              inlineScript: |
                export ARM_TENANT_ID=$AZURESUBSCRIPTION_TENANT_ID
                export ARM_CLIENT_ID=$AZURESUBSCRIPTION_CLIENT_ID
                export ARM_OIDC_AZURE_SERVICE_CONNECTION_ID=$AZURESUBSCRIPTION_SERVICE_CONNECTION_ID
                export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
                export ARM_USE_OIDC=true
                terraform init \
                  -backend-config="resource_group_name=$(backendRgName)" \
                  -backend-config="storage_account_name=$(backendStorageAccount)" \
                  -backend-config="container_name=$(backendContainer)" \
                  -backend-config="key=$(backendKey)" \
                  -backend-config="use_azuread_auth=true"
            env:
              ARM_OIDC_REQUEST_TOKEN: $(System.AccessToken)

          - task: AzureCLI@2
            displayName: 'Validate'
            inputs:
              azureSubscription: '$(serviceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              workingDirectory: '$(System.DefaultWorkingDirectory)/infra'
              inlineScript: |
                export ARM_TENANT_ID=$AZURESUBSCRIPTION_TENANT_ID
                export ARM_CLIENT_ID=$AZURESUBSCRIPTION_CLIENT_ID
                export ARM_OIDC_AZURE_SERVICE_CONNECTION_ID=$AZURESUBSCRIPTION_SERVICE_CONNECTION_ID
                export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
                export ARM_USE_OIDC=true
                terraform validate
            env:
              ARM_OIDC_REQUEST_TOKEN: $(System.AccessToken)

          - task: AzureCLI@2
            displayName: 'Plan'
            inputs:
              azureSubscription: '$(serviceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              workingDirectory: '$(System.DefaultWorkingDirectory)/infra'
              inlineScript: |
                export ARM_TENANT_ID=$AZURESUBSCRIPTION_TENANT_ID
                export ARM_CLIENT_ID=$AZURESUBSCRIPTION_CLIENT_ID
                export ARM_OIDC_AZURE_SERVICE_CONNECTION_ID=$AZURESUBSCRIPTION_SERVICE_CONNECTION_ID
                export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
                export ARM_USE_OIDC=true
                terraform plan \
                  -var-file="$(tfvarsFile)" \
                  -out=$(Build.ArtifactStagingDirectory)/tfplan
            env:
              ARM_OIDC_REQUEST_TOKEN: $(System.AccessToken)

          - publish: '$(Build.ArtifactStagingDirectory)/tfplan'
            artifact: tfplan

  # Only runs on push to development/production, not on PRs.
  # 'production' environment requires an Approval check in Pipelines > Environments.
  - stage: Apply
    displayName: 'Apply (${{ variables.envName }})'
    dependsOn: Plan
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - deployment: terraform_apply
        environment: '${{ variables.envName }}'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - download: current
                  artifact: tfplan

                - script: |
                    TF_VERSION="1.15.7"
                    curl -fsSL "https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip" -o terraform.zip
                    unzip -o terraform.zip
                    sudo mv terraform /usr/local/bin/terraform
                    terraform version
                  displayName: 'Install Terraform'

                - task: AzureCLI@2
                  displayName: 'Init'
                  inputs:
                    azureSubscription: '$(serviceConnection)'
                    scriptType: bash
                    scriptLocation: inlineScript
                    workingDirectory: '$(System.DefaultWorkingDirectory)/infra'
                    inlineScript: |
                      export ARM_TENANT_ID=$AZURESUBSCRIPTION_TENANT_ID
                      export ARM_CLIENT_ID=$AZURESUBSCRIPTION_CLIENT_ID
                      export ARM_OIDC_AZURE_SERVICE_CONNECTION_ID=$AZURESUBSCRIPTION_SERVICE_CONNECTION_ID
                      export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
                      export ARM_USE_OIDC=true
                      terraform init \
                        -backend-config="resource_group_name=$(backendRgName)" \
                        -backend-config="storage_account_name=$(backendStorageAccount)" \
                        -backend-config="container_name=$(backendContainer)" \
                        -backend-config="key=$(backendKey)" \
                        -backend-config="use_azuread_auth=true"
                  env:
                    ARM_OIDC_REQUEST_TOKEN: $(System.AccessToken)

                - task: AzureCLI@2
                  displayName: 'Apply'
                  inputs:
                    azureSubscription: '$(serviceConnection)'
                    scriptType: bash
                    scriptLocation: inlineScript
                    workingDirectory: '$(System.DefaultWorkingDirectory)/infra'
                    inlineScript: |
                      export ARM_TENANT_ID=$AZURESUBSCRIPTION_TENANT_ID
                      export ARM_CLIENT_ID=$AZURESUBSCRIPTION_CLIENT_ID
                      export ARM_OIDC_AZURE_SERVICE_CONNECTION_ID=$AZURESUBSCRIPTION_SERVICE_CONNECTION_ID
                      export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
                      export ARM_USE_OIDC=true
                      terraform apply $(Pipeline.Workspace)/tfplan/tfplan
                  env:
                    ARM_OIDC_REQUEST_TOKEN: $(System.AccessToken)
