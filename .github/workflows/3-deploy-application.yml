name: 3 - Deploy Protocol Indexer

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted]
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          auth-type: IDENTITY
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"

      - name: Publish
        run: dotnet publish src/ProtocolsIndexer/ProtocolsIndexer.csproj -c Release -o ./publish

      - name: Deploy
        run: |
          sudo apt-get install -y zip
          cd ./publish && zip -r ../protocol-indexer.zip . && cd ..
          az functionapp deployment source config-zip \
            --resource-group rg-agentic-rag-chunking \
            --name func-protocols-indexer \
            --src ./protocol-indexer.zip
