name: 3 - Deploy Protocol Indexer

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted]
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          auth-type: IDENTITY
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"

      - name: Publish
        run: dotnet publish src/ProtocolsIndexer/ProtocolsIndexer.csproj -c Release -o ./publish

      - name: Deploy
        uses: Azure/functions-action@v1
        with:
          app-name: func-protocols-indexer
          package: ./publish
