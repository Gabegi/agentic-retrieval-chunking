name: 4 - Evaluate RAG Quality

on:
  workflow_dispatch:

jobs:
  evaluate:
    runs-on: [self-hosted]
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          auth-type: IDENTITY
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"

      - uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false

      - name: Load config from Terraform outputs
        working-directory: ./infra
        env:
          ARM_USE_MSI: true
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          terraform init
          echo "SEARCH_ENDPOINT=$(terraform output -raw search_endpoint)"               >> $GITHUB_ENV
          echo "OPENAI_ENDPOINT=$(terraform output -raw openai_endpoint)"               >> $GITHUB_ENV
          echo "OPENAI_EMBEDDING_DEPLOYMENT=$(terraform output -raw openai_embedding_deployment)" >> $GITHUB_ENV
          echo "OPENAI_GPT_DEPLOYMENT=$(terraform output -raw openai_gpt_deployment)"   >> $GITHUB_ENV
          echo "OPENAI_GPT_MODEL_NAME=$(terraform output -raw openai_gpt_model_name)"   >> $GITHUB_ENV
          echo "OPENAI_EVAL_DEPLOYMENT=$(terraform output -raw openai_eval_deployment)" >> $GITHUB_ENV
          echo "SEARCH_INDEX_NAME=$(terraform output -raw search_index_name)"           >> $GITHUB_ENV
          echo "STORAGE_ACCOUNT_URL=$(terraform output -raw storage_account_url)"       >> $GITHUB_ENV
          echo "STORAGE_CONTAINER=$(terraform output -raw storage_container_test_results)" >> $GITHUB_ENV
          echo "KNOWLEDGE_SOURCE_NAME=$(terraform output -raw knowledge_source_name)"   >> $GITHUB_ENV
          echo "KNOWLEDGE_BASE_NAME=$(terraform output -raw knowledge_base_name)"       >> $GITHUB_ENV

      - name: Open storage firewall for runner
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "RUNNER_IP=$RUNNER_IP" >> $GITHUB_ENV
          az storage account network-rule add \
            --account-name staccountchunkingrag \
            --resource-group rg-agentic-rag-chunking \
            --ip-address "$RUNNER_IP"
          sleep 15

      - name: Run RAG evaluation
        run: |
          dotnet test src/RagApp.Evaluation.Tests/RagApp.Evaluation.Tests.csproj \
            -c Release \
            --filter "TestCategory=golden" \
            --logger "trx;LogFileName=eval-results.trx" \
            --logger "console;verbosity=normal"

      - name: Close storage firewall
        if: always()
        run: |
          az storage account network-rule remove \
            --account-name staccountchunkingrag \
            --resource-group rg-agentic-rag-chunking \
            --ip-address "$RUNNER_IP"

      - name: Upload TRX results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results-${{ github.run_number }}
          path: '**/*.trx'
