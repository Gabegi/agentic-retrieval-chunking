name: 4 - Evaluate RAG Quality

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["3 - Deploy Application"]
    types: [completed]

jobs:
  evaluate:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted]
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          auth-type: IDENTITY
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"

      - name: Run RAG evaluation
        env:
          SEARCH_ENDPOINT:             ${{ vars.SEARCH_ENDPOINT }}
          OPENAI_ENDPOINT:             ${{ vars.OPENAI_ENDPOINT }}
          OPENAI_EMBEDDING_DEPLOYMENT: ${{ vars.OPENAI_EMBEDDING_DEPLOYMENT }}
          OPENAI_GPT_DEPLOYMENT:       ${{ vars.OPENAI_GPT_DEPLOYMENT }}
          OPENAI_GPT_MODEL_NAME:       ${{ vars.OPENAI_GPT_MODEL_NAME }}
          OPENAI_EVAL_DEPLOYMENT:      ${{ vars.OPENAI_EVAL_DEPLOYMENT }}
          SEARCH_INDEX_NAME:           ${{ vars.SEARCH_INDEX_NAME }}
          STORAGE_ACCOUNT_URL:         ${{ vars.STORAGE_ACCOUNT_URL }}
          STORAGE_CONTAINER:           ${{ vars.STORAGE_CONTAINER }}
          KNOWLEDGE_SOURCE_NAME:       ${{ vars.KNOWLEDGE_SOURCE_NAME }}
          KNOWLEDGE_BASE_NAME:         ${{ vars.KNOWLEDGE_BASE_NAME }}
        run: |
          dotnet test src/RagApp.Evaluation.Tests/RagApp.Evaluation.Tests.csproj \
            -c Release \
            --logger "trx;LogFileName=eval-results.trx" \
            --logger "console;verbosity=normal"

      - name: Upload TRX results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results-${{ github.run_number }}
          path: '**/*.trx'
